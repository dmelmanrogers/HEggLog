name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.10.1"
          cabal-version: "3.12.1.0"

      - name: Update package index
        run: cabal update

      - name: Build
        run: cabal build all

      - name: Test
        run: cabal test all

      - name: Check package metadata
        run: cabal check

      - name: Check whitespace
        run: git diff --check
