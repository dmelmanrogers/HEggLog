name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install native toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Set up Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.10.1"
          cabal-version: "3.12.1.0"

      - name: Update package index
        run: cabal update

      - name: Build
        run: cabal build all

      - name: Validate Haskell 2010 backlog
        run: python3 scripts/validate-haskell2010-todo.py

      - name: Test
        run: cabal test all --test-options='--hide-successes'

      - name: Check package metadata
        run: cabal check

      - name: Mandatory end-to-end wet tests
        run: scripts/e2e-wet-test.sh

      - name: Check whitespace
        run: git diff --check
